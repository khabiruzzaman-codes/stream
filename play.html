<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="play.js"></script>
  <title>stream / play</title>
  <style>
    :root {
      --bg-color: white;
      --container-color: rgb(200, 200, 200);
      --card-color: rgb(180, 180, 180);
      --font-color: black;
      --accent-color: rgb(0, 140, 255);
      --shadow-color: rgba(250, 250, 250, 0.9);
      --border-color: rgba(126, 126, 126, 0.8);
      --button-color: rgb(50, 50, 50);
      --glass-color: rgba(0, 0, 0, 0.15);
      --info-shadow-color: rgba(255, 255, 255, 0.8);



    }

    .dark {
      --bg-color: black;
      --container-color: rgb(30, 30, 30);
      --card-color: rgb(60, 60, 60);
      --font-color: white;
      --accent-color: rgb(255, 0, 0);
      --shadow-color: rgba(10, 10, 10, 0.9);
      --border-color: rgba(126, 126, 126, 0.8);
      --button-color: rgb(200, 200, 200);
      --info-shadow-color: rgba(0, 0, 0, 0.8);
    }

    *,
    *::before,
    *::after {
      padding: 0;
      margin: 0;
      border: none;
      list-style: none;
      outline: none;
      text-decoration: none;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    img {
      max-width: 100%;
      object-fit: contain;
      display: block;
    }


    body {
      width: 100%;
      min-height: 100vh;
      font-family: sans-serif;
      color: var(--font-color);
      background-color: var(--bg-color);
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }

    html,
    body {
      height: 100%;
    }

    main {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #stream {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #stream iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .exit {
      position: fixed;
      top: 1rem;
      left: 1rem;
      padding: 0.5rem;
      border-radius: 50%;
      background-color: var(--glass-color);
      backdrop-filter: blur(5px);
      border: 1px solid var(--border-color);
      z-index: 200;
      transition: background 0.2s, transform 0.25s;
    }

    .exit:hover {
      cursor: pointer;
      background: var(--button-color);
      transform: scale(1.1);
    }

    .exitImage {
      width: 1.5rem;
      opacity: 0.75;
      transition: opacity 0.2s, filter 0.2s;

    }

    .exitImage:hover {
      opacity: 1;
      filter: invert(1);
    }
  </style>
</head>

<body class="light">

  <main>

    <a href="index.html" class="exit" id="exit"><img src="images/returnLight.png" alt="" class="exitImage"
        id="exitImage"></a>
    <div id="stream"></div>

  </main>
</body>

</html>

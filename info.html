<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script type="module" src="info.js"></script>
    <title>stream / info</title>
    <style>
        :root {
            --bg-color: white;
            --container-color: rgb(200, 200, 200);
            --card-color: rgb(180, 180, 180);
            --font-color: black;
            --accent-color: rgb(0, 140, 255);
            --shadow-color: rgba(250, 250, 250, 0.9);
            --border-color: rgba(126, 126, 126, 0.8);
            --button-color: rgb(50, 50, 50);
            --glass-color: rgba(0, 0, 0, 0.15);
            --info-shadow-color: rgba(255, 255, 255, 0.8);



        }

        .dark {
            --bg-color: black;
            --container-color: rgb(30, 30, 30);
            --card-color: rgb(60, 60, 60);
            --font-color: white;
            --accent-color: rgb(255, 0, 0);
            --shadow-color: rgba(10, 10, 10, 0.9);
            --border-color: rgba(126, 126, 126, 0.8);
            --button-color: rgb(200, 200, 200);
            --info-shadow-color: rgba(0, 0, 0, 0.8);
        }

        *,
        *::before,
        *::after {
            padding: 0;
            margin: 0;
            border: none;
            list-style: none;
            outline: none;
            text-decoration: none;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        img {
            max-width: 100%;
            object-fit: contain;
            display: block;
        }


        body {
            width: 100%;
            min-height: 100vh;
            font-family: sans-serif;
            color: var(--font-color);
            background-color: var(--bg-color);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        main {
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .landingPage {

            --bg-image: none;
            width: 100%;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            row-gap: 1rem;
            padding: 1rem 2rem;
        }

        .landingPage::before {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--bg-image);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            z-index: 0;
        }

        .landingPage::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top right, var(--info-shadow-color) 10%, transparent 50%);
            z-index: 1;
        }

        .landingPage>* {
            position: relative;
            z-index: 2;
        }

        main>* {
            position: relative;
            z-index: 2;
        }

        .restPage {
            width: 80%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 0;
        }

        .tvStreamSection {
            width: 100%;
            display: flex;
            flex-direction: column;
            row-gap: 4rem;
        }

        .tvStreamSelection {
            width: 100%;
            display: flex;
            column-gap: 2vw;
        }

        .episodePreview {
            width: 100%;
            background-color: var(--glass-color);
            backdrop-filter: blur(5px);
            display: flex;
            column-gap: 2rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.2s ease-in both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .episodeImage {
            width: fit-content;
            overflow: hidden;
            border-radius: 0 0.5rem 0.5rem 0;
        }

        .episodeImage a {
            color: var(--font-color);
        }

        .episodeImage img {
            width: 250px;
            object-fit: contain;
        }

        .episodeName {
            width: 100%;
            padding: 0.5rem 0.25rem;

        }

        .episodeName a {
            color: var(--font-color);
        }

        .episodeName p:nth-child(1) {
            font-family: Raleway, sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .episodeName p:nth-child(2) {}

        .tvSeasonHead,
        .tvEpisodesHead {
            width: 100%;
            border: 1px solid var(--border-color);
            background-color: var(--glass-color);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
        }

        .seasonSelect,
        .episodesSelect {
            width: 100%;
            padding: 0.5rem;
            background-color: transparent !important;
            color: var(--font-color) !important;
        }

        .seasonSelect option,
        .episodesSelect option {
            cursor: pointer;
            background: var(--glass-color) !important;
            backdrop-filter: blur(5px) !important;
            color: var(--font-color) !important;
        }

        .exit {
            position: fixed;
            top: 1rem;
            left: 1rem;
            padding: 0.5rem;
            border-radius: 50%;
            background-color: var(--glass-color);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
            z-index: 200;
            transition: background 0.2s, transform 0.25s;
        }

        .exit:hover {
            cursor: pointer;
            background: var(--button-color);
            transform: scale(1.1);
        }

        .exitImage {
            width: 1.5rem;
            opacity: 0.75;
            transition: opacity 0.2s, filter 0.2s;

        }

        .exitImage:hover {
            opacity: 1;
            filter: invert(1);
        }

        .movieButtons {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            column-gap: 1rem;
        }

        .movieButtons a {
            display: flex;
            column-gap: 0.5rem;
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--glass-color);
            backdrop-filter: blur(5px);
            color: var(--font-color);
        }

        .movieButtons a img {
            width: 1rem;
        }

        .movieStat {
            width: 100%;
            display: flex;
            flex-direction: column;
            row-gap: 1rem;
        }

        .movieTiming {
            width: 100%;
            display: flex;
            column-gap: 1rem;
        }

        .movieTiming div {
            display: Flex;
            justify-content: center;
            align-items: center;
            column-gap: 0.25rem;
        }

        .movieTitleDiv {
            width: 100%;
            display: flex;
            flex-direction: column;
            line-height: normal;
        }

        .movieTitle {
            font-family: Cinzel, sans-serif;
            font-weight: 600;
            font-size: 4rem;

        }

        .movieTagLine {
            font-family: Raleway, sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
        }

        .genreDiv {
            display: flex;
            column-gap: 1rem;
        }

        .genreDiv p {
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
        }

        .overView {
            width: 30%;
        }

        .costCollection {
            display: flex;
            column-gap: 1rem;
        }

        .akaTitleDiv {
            display: flex;
            column-gap: 0.25rem;
        }

        .akaBar {
            width: 0.2rem;
            background-color: var(--accent-color);
            border-radius: 0.5rem;
        }

        .akaTitle {
            display: flex;
            flex-direction: column;
            line-height: normal;
        }

        .akaTitle span:nth-child(1) {
            font-size: 1rem;
            opacity: 0.6;
        }

        .akaTitle span:nth-child(2) {
            font-size: 2rem;
            font-family: Raleway, sans-serif;
            font-weight: 600;
        }


        @media (max-width: 768px) {
            .restPage {
                width: 95%;
            }

        }

        @media (max-width: 550px) {
            .restPage {
                width: 98%;
                padding: 2rem 0;
            }

            .tvStreamSection {
                row-gap: 2rem;
            }

            .overView {
                width: 60%;
            }

        }
    </style>
</head>

<body class="light">

    <main>
        <a href="index.html" class="exit" id="exit"><img src="images/returnLight.png" alt="" class="exitImage"
                id="exitImage"></a>

        <section class="landingPage" id="landingPage">

            <div class="movieButtons" id="movieButtons"></div>
            <div class="movieStat" id="movieStat"></div>

        </section>

        <section class="restPage" id="restPage"></section>

    </main>
</body>

</html>

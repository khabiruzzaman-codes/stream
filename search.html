<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="search.js"></script>
  <title>stream / search</title>
  <style>
    :root {
      --bg-color: white;
      --container-color: rgb(200, 200, 200);
      --card-color: rgb(180, 180, 180);
      --font-color: black;
      --accent-color: rgb(0, 140, 255);
      --shadow-color: rgba(250, 250, 250, 0.9);
      --border-color: rgba(126, 126, 126, 0.8);
      --button-color: rgb(50, 50, 50);
      --glass-color: rgba(0, 0, 0, 0.15);


    }

    .dark {
      --bg-color: black;
      --container-color: rgb(30, 30, 30);
      --card-color: rgb(60, 60, 60);
      --font-color: white;
      --accent-color: rgb(255, 0, 0);
      --shadow-color: rgba(10, 10, 10, 0.9);
      --border-color: rgba(126, 126, 126, 0.8);
      --button-color: rgb(200, 200, 200);
    }

    *,
    *::before,
    *::after {
      padding: 0;
      margin: 0;
      border: none;
      list-style: none;
      outline: none;
      text-decoration: none;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    img {
      max-width: 100%;
      object-fit: cover;
      display: block;
    }


    body {
      width: 100%;
      min-height: 100vh;
      font-family: sans-serif;
      color: var(--font-color);
      background-color: var(--bg-color);
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      position: fixed;
      top: 0;
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    nav {
      width: 80%;
      margin-top: 1rem;
      background-color: var(--glass-color);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      box-shadow: var(--shadow-color);
      transition: background-color 0.35s, box-shadow 0.35s;
    }

    nav ul {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      column-gap: 2rem;
    }


    .homeLi {
      margin-right: auto;
    }

    .homeLi a {
      font-family: 'Instrument Serif', serif;
      font-size: 1.4rem;
      color: var(--font-color);
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }

    .homeLi a:hover {
      color: var(--accent-color);
    }

    ul .searchLi .toSearch {
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      transition: background 0.2s;
    }

    ul .searchLi .toSearch:hover {
      background: var(--border-color);
    }

    ul .searchLi .toSearch img {
      width: 1.2rem;
    }


    li a {
      color: var(--font);
      position: relative;
    }

    li .toGo {
      color: var(--font-color);
      transition: color 0.2s;
    }

    li .toGo::before {
      content: "";
      background: var(--accent-color);
      position: absolute;
      bottom: -0.25rem;
      left: 0;
      height: 1.5px;
      width: 0%;
      border-radius: 2px;
      transition: width 0.5s ease-out;
    }

    li .toGo:hover::before {
      width: 100%;
    }

    .theme {
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .theme:hover {
      opacity: 1;
      transform: rotate(25deg) scale(1.1);
    }

    main {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main {
      width: 100%;
      margin-top: 0;
      padding-top: 10rem;
      min-height: 100vh;
    }

    .mainPage {
      width: 80%;
      display: flex;
      flex-direction: column;
      row-gap: 2.5rem;
    }

    .searchSection {
      width: 100%;
      background-color: var(--glass-color);
      backdrop-filter: blur(10px);
      border: 2px solid var(--border-color);
      border-radius: 1rem;
      padding: 2rem 4rem;
    }

    .titleSection {
      width: 100%;
    }

    .titleDiv {
      width: 100%;
      border-bottom: 1px solid var(--border-color);
    }

    .titleDiv h2 {
      font-family: sans-serif;
      font-weight: 500;
      font-size: 1.5rem;
      opacity: 0.8;
    }

    .cardGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(200px, 100%), 1fr));
      column-gap: 1rem;
      row-gap: 1rem;

    }

    .card {
      box-shadow: 0 0.1rem 1rem var(--shadow-color), 0 0.1rem 1.5rem var(--shadow-color);
    }

    .searchRow {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .categorySelect {
      width: 100%;
      padding: 1rem;
      flex: 2;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      background-color: var(--glass-color);
      backdrop-filter: blur(5px);
      color: var(--font-color);
      font-size: 1.25rem;

    }

    .searchBar {
      width: 100%;
      padding: 1rem;
      flex: 5;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      background-color: var(--glass-color);
      backdrop-filter: blur(5px);
      color: var(--font-color);
      font-size: 1.25rem;
    }

    .searchButton {
      width: fit-content;
      padding: 1rem;
      flex: 1;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      background-color: var(--glass-color);
      backdrop-filter: blur(5px);
      color: var(--font-color);
      font-size: 1.25rem;
      transition: background-color 0.2s ease-in, border-color 0.2s ease-out;
    }

    .searchButton:hover {
      background-color: var(--button-color);
      border-color: transparent;
      cursor: pointer;

    }

    @media (max-width: 768px) {
      nav {
        width: 95%;
        padding: 0.25rem 0.5rem;
      }

      .mainPage {
        width: 95%;
        row-gap: 2rem;
      }

      main {
        padding-top: 5rem;
      }

      .searchSection {
        padding: 1rem 2rem;
      }

      .categorySelect {
        font-size: 1rem;
      }

      .searchBar {
        font-size: 1rem;
      }

      .searchButton {
        font-size: 1rem;
      }

    }

    @media (max-width: 550px) {
      nav {
        width: 98%;
        margin-top: 0.25rem;
      }

      nav ul {
        column-gap: 0.5rem;
      }

      .homeLi a {
        font-size: 1.25rem;
      }

      li .toGo {
        font-size: 0.85rem;
      }

      .categorySelect {
        font-size: 0.85rem;
      }

      .searchBar {
        font-size: 0.85rem;
      }

      .searchButton {
        font-size: 0.85rem;
      }

    }
  </style>
</head>

<body class="light">
  <header>
    <nav>
      <ul>
        <li class="homeLi"><a href="index.html">stream</a></li>
        <li class="searchLi" id="searchLi">
          <button class="toSearch" id="toSearch">
            <a href="search.html"><img src="images/searchLight.svg" alt="" id="toSearchImg"></a>
          </button>
        </li>
        <li><a href="#" class="toGo">Movies</a></li>
        <li><a href="#" class="toGo">Tv-shows</a></li>
        <li><a href="#" class="toGo">Anime</a></li>
        <li><img id="theme" class="theme" src="images/lightMode.svg" alt=""></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="mainPage" id="mainPage">

      <section class="searchSection" id="searchSection">

        <div class="searchRow">
          <select name="" id="categorySelect" class="categorySelect">
            <option value="default" disabled selected hidden>All</option>
            <option value="movie">Movies</option>
            <option value="tv">Tv-shows</option>
            <option value="animation">Animation</option>
          </select>

          <input type="search" class="searchBar" id="searchBar" placeholder="Search movies, shows…">

          <button class="searchButton" id="searchButton">Search</button>
        </div>

      </section>

      <section class="titleSection" id="titleSection"></section>
      <section class="cardGrid" id="cardGrid"></section>

    </section>

  </main>
  <footer></footer>
</body>

</html>
